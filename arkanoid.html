<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арканоид</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; font-size: 2rem; }
        #gameCanvas {
            border: 3px solid #58a6ff;
            background: #0d1117;
        }
        .info { margin-top: 20px; text-align: center; }
        .score { font-size: 1.5rem; color: #58a6ff; }
        .back-link {
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🎾 Арканоид</h1>
    <canvas id="gameCanvas" width="480" height="360"></canvas>
    <div class="info">
        <div class="score">Счёт: <span id="score">0</span></div>
        <div>← → управление | Enter - начать</div>
    </div>
    <a href="index.html" class="back-link">← Назад к статистике</a>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        let paddle = { x: 180, y: 340, w: 100, h: 15, dx: 8 };
        let ball = { x: 240, y: 320, r: 8, dx: 4, dy: -4, speed: 5 };
        let blocks = [];
        let score = 0;
        let started = false;
        const rows = 5, cols = 8, padding = 5, offsetX = 15, offsetY = 30;
        const blockW = (canvas.width - offsetX * 2 - padding * (cols - 1)) / cols;
        const blockH = 20;
        
        const colors = ['#ff6b6b', '#ffa502', '#ffeaa7', '#55efc4', '#74b9ff'];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                blocks.push({
                    x: offsetX + c * (blockW + padding),
                    y: offsetY + r * (blockH + padding),
                    w: blockW,
                    h: blockH,
                    color: colors[r],
                    active: true
                });
            }
        }
        
        function drawPaddle() {
            ctx.fillStyle = '#58a6ff';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        }
        
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = '#7ee787';
            ctx.fill();
            ctx.closePath();
        }
        
        function drawBlocks() {
            blocks.forEach(b => {
                if (b.active) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });
        }
        
        function collision() {
            blocks.forEach(b => {
                if (!b.active) return;
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
                    ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    b.active = false;
                    ball.dy = -ball.dy;
                    score += 10;
                    scoreEl.textContent = score;
                }
            });
        }
        
        function update() {
            if (!started) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx = -ball.dx;
            if (ball.y - ball.r < 0) ball.dy = -ball.dy;
            
            if (ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.dy = -Math.abs(ball.dy);
                let hit = (ball.x - paddle.x) / paddle.w;
                ball.dx = (hit - 0.5) * 8;
            }
            
            if (ball.y - ball.r > canvas.height) {
                started = false;
                ball.x = 240; ball.y = 320;
                ball.dx = 4; ball.dy = -4;
            }
            
            collision();
            drawBlocks();
            drawPaddle();
            drawBall();
            
            if (!blocks.some(b => b.active)) {
                ctx.fillStyle = '#7ee787';
                ctx.font = '30px sans-serif';
                ctx.fillText('ПОБЕДА!', 160, 180);
                started = false;
            } else {
                requestAnimationFrame(update);
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !started) {
                started = true;
                update();
            }
            if (e.key === 'ArrowLeft') paddle.x = Math.max(0, paddle.x - paddle.dx);
            if (e.key === 'ArrowRight') paddle.x = Math.min(canvas.width - paddle.w, paddle.x + paddle.dx);
            if (started) {
                drawPaddle();
                drawBall();
            }
        });
        
        ctx.fillStyle = '#58a6ff';
        ctx.font = '20px sans-serif';
        ctx.fillText('Нажми Enter', 170, 180);
        drawBlocks();
        drawPaddle();
        drawBall();
    </script>
</body>
</html>
