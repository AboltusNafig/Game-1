<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Badges - Статистика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #7ee787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #8b949e;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-label {
            color: #8b949e;
            margin-top: 8px;
        }
        
        .badges-section {
            margin-top: 40px;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        
        .badge {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .badge:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
        
        .badge-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .badge-name {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .badge-owned {
            background: rgba(126, 231, 135, 0.1);
            border-color: #7ee787;
        }
        
        .badge-locked {
            opacity: 0.5;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #58a6ff;
        }
        
        .total-badges {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 12px;
        }
        
        .games-section {
            margin-top: 60px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #58a6ff;
        }
        
        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .game-desc {
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 GitHub Achievements</h1>
            <p class="subtitle">Отслеживай свои достижения</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalBadges">0</div>
                <div class="stat-label">Всего бейджей</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="earnedBadges">0</div>
                <div class="stat-label">Получено</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="progress">0%</div>
                <div class="stat-label">Прогресс</div>
            </div>
        </div>
        
        <div class="badges-section">
            <h2 class="section-title">🎖️ Достижения</h2>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="earned">Полученные</button>
                <button class="filter-btn" data-filter="locked">Заблокированные</button>
            </div>
            
            <div class="badges-grid" id="badgesGrid"></div>
        </div>
        
        <div class="total-badges">
            Твой прогресс: <span id="progressText">0</span> из <span id="totalText">0</span> достижений
        </div>
        
        <div class="games-section">
            <h2 class="section-title">🎮 Игры</h2>
            <div class="games-grid">
                <a href="tetris.html" class="game-card">
                    <div class="game-icon">🧱</div>
                    <div class="game-title">Тетрис</div>
                    <div class="game-desc">Классическая головоломка</div>
                </a>
                <a href="arkanoid.html" class="game-card">
                    <div class="game-icon">🎾</div>
                    <div class="game-title">Арканоид</div>
                    <div class="game-desc">Отбей мячик</div>
                </a>
                <a href="snake.html" class="game-card">
                    <div class="game-icon">🐍</div>
                    <div class="game-title">Змейка</div>
                    <div class="game-desc">Ешь яблоки, расти</div>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        const badges = [
            { id: 1, name: "Starstruck", icon: "⭐", earned: false, description: "100 звезд на репозитории" },
            { id: 2, name: "YOLO", icon: "🎉", earned: true, description: "Merged без review" },
            { id: 3, name: "Quickdraw", icon: "⚡", earned: false, description: "Создал issue за 5 минут" },
            { id: 4, name: "Pair Extraordinaire", icon: "👯", earned: true, description: "Commit в паре" },
            { id: 5, name: "Pull Shark", icon: "🦈", earned: false, description: "100 merge requests" },
            { id: 6, name: "Arctic Code Vault", icon: "❄️", earned: false, description: "Код в Арктике" },
            { id: 7, name: "DevOps", icon: "🔧", earned: true, description: "CI/CD настроен" },
            { id: 8, name: "Sponsor", icon: "❤️", earned: false, description: "Спонсируешь разработчиков" },
            { id: 9, name: "Maverick", icon: "🚀", earned: false, description: "Создал публичный репозиторий" },
            { id: 10, name: "Robot", icon: "🤖", earned: true, description: "Использовал GitHub Actions" },
            { id: 11, name: "Galaxy", icon: "🌌", earned: false, description: "1000 contributions" },
            { id: 12, name: "Infinity", icon: "∞", earned: false, description: "365 дней streak" }
        ];
        
        function renderBadges(filter = 'all') {
            const grid = document.getElementById('badgesGrid');
            grid.innerHTML = '';
            
            let filtered = badges;
            if (filter === 'earned') filtered = badges.filter(b => b.earned);
            if (filter === 'locked') filtered = badges.filter(b => !b.earned);
            
            filtered.forEach(badge => {
                const div = document.createElement('div');
                div.className = `badge ${badge.earned ? 'badge-owned' : 'badge-locked'}`;
                div.innerHTML = `
                    <div class="badge-icon">${badge.icon}</div>
                    <div class="badge-name">${badge.name}</div>
                `;
                grid.appendChild(div);
            });
            
            updateStats();
        }
        
        function updateStats() {
            const earned = badges.filter(b => b.earned).length;
            const total = badges.length;
            const percent = Math.round((earned / total) * 100);
            
            document.getElementById('totalBadges').textContent = total;
            document.getElementById('earnedBadges').textContent = earned;
            document.getElementById('progress').textContent = percent + '%';
            document.getElementById('progressText').textContent = earned;
            document.getElementById('totalText').textContent = total;
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderBadges(btn.dataset.filter);
            });
        });
        
        renderBadges();
    </script>
</body>
</html>
