<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; font-size: 2rem; }
        #gameCanvas {
            border: 3px solid #58a6ff;
            background: #0d1117;
        }
        .info { margin-top: 20px; text-align: center; }
        .score { font-size: 1.5rem; color: #58a6ff; }
        .back-link {
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🐍 Змейка</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">
        <div class="score">Счёт: <span id="score">0</span></div>
        <div>← → движение | Enter - начать</div>
    </div>
    <a href="index.html" class="back-link">← Назад к статистике</a>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scale = 20;
        const cols = canvas.width / scale;
        const rows = canvas.height / scale;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0, dy = 0;
        let score = 0;
        let gameRunning = false;
        
        function init() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            dx = 1; dy = 0;
            placeFood();
            score = 0;
            document.getElementById('score').textContent = score;
        }
        
        function placeFood() {
            food.x = Math.floor(Math.random() * cols);
            food.y = Math.floor(Math.random() * rows);
            snake.forEach(s => {
                if (s.x === food.x && s.y === food.y) placeFood();
            });
        }
        
        function draw() {
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(food.x * scale, food.y * scale, scale - 1, scale - 1);
            
            ctx.fillStyle = '#7ee787';
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#7ee787' : '#58a6ff';
                ctx.fillRect(s.x * scale, s.y * scale, scale - 1, scale - 1);
            });
        }
        
        function update() {
            if (!gameRunning) return;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
                gameRunning = false;
                ctx.fillStyle = '#ff6b6b';
                ctx.font = '30px sans-serif';
                ctx.fillText('Игра окончена!', 80, 180);
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !gameRunning) {
                init();
                gameRunning = true;
                update();
            }
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });
        
        init();
        draw();
    </script>
</body>
</html>
